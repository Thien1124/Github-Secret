name: CI/CD Workflow

on:
  push:
    branches: ["main"]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Print greeting
        run: echo "Hello HUTECH! Phuoc Thien day !"

      - name: Checkout code
        uses: actions/checkout@v4

      # BƯỚC 1: Thiết lập môi trường Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # BƯỚC 2: Build file JAR từ mã nguồn (Chạy tại gốc vì pom.xml đã ở đây)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # BƯỚC 3: Đóng gói và đẩy Image lên Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/duanjava:latest
